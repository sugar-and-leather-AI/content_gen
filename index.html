<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Social Ideas Generator</title>

<style>
body{
  font-family: Arial;
  max-width: 900px;
  margin: 30px auto;
}

input, textarea, button{
  width:100%;
  padding:10px;
  margin:8px 0;
}

.idea{
  border:1px solid #ddd;
  padding:15px;
  margin:15px 0;
  border-radius:6px;
}

.posts{
  margin-top:10px;
  padding:12px;
  background:#f7f7f7;
  border-radius:4px;
}

.platform{
  margin-top:12px;
}

.platform h4{
  margin-bottom:6px;
}
</style>

</head>

<body>

<h2>Generate Social Media Ideas</h2>

<label>Category</label>
<input id="category" placeholder="AI / Education / Finance" value="AI"/>

<label>Websites (one per line, max 10)</label>
<textarea id="websites" rows="8"
placeholder="https://site1.com
https://site2.com"></textarea>

<button onclick="generateIdeas()">Generate Ideas</button>

<div id="results"></div>

<script>

// Replace with your n8n production webhook URLs
const IDEAS_URL = "https://velven.app.n8n.cloud/webhook/ideas/generate";
const POSTS_URL = "https://velven.app.n8n.cloud/webhook/ideas/generate-text-content";


// GENERATE IDEAS
async function generateIdeas(){

  const category = document.getElementById("category").value.trim();

  const websites = document.getElementById("websites")
  .value
  .split("\n")
  .map(x => x.trim())
  .filter(Boolean);

  const resDiv = document.getElementById("results");
  resDiv.innerHTML = "Loading ideas...";

  try{

    const resp = await fetch(IDEAS_URL,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        category,
        websites
      })
    });

    const data = await resp.json();

    if(!resp.ok){
      resDiv.innerHTML = "Error: " + (data.message || JSON.stringify(data));
      return;
    }

    resDiv.innerHTML =
      `<h3>Top Ideas</h3>` +
      data.ideas.map(i => `

      <div class="idea">

        <b>${i.idea_title}</b>

        <div style="margin-top:6px">${i.idea_summary}</div>

        <button onclick="generatePosts('${i.idea_id}')">
          Generate Posts
        </button>

        <div id="posts-${i.idea_id}" class="posts"></div>

      </div>

    `).join("");

  }catch(e){
    resDiv.innerHTML = "Error calling workflow.";
  }

}



// GENERATE POSTS

async function generatePosts(idea_id) {
  const div = document.getElementById("posts-" + idea_id);
  div.innerHTML = "Generating posts...";

  try {
    const resp = await fetch(POSTS_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ idea_id })
    });

    const data = await resp.json();

    if (!resp.ok) {
      div.innerHTML = "Error: " + (data.message || JSON.stringify(data));
      return;
    }

    if (!data.content) {
      div.innerHTML = "Error: No content returned from workflow";
      return;
    }

    div.innerHTML = `
      <div class="platform">
        <h4>LinkedIn</h4>
        <div>${escapeHtml(data.content.linkedin?.text || "")}</div>
        <div style="color:#777;margin-top:6px;">
          ${(data.content.linkedin?.hashtags || []).join(" ")}
        </div>
      </div>

      <div class="platform">
        <h4>X / Twitter</h4>
        <div>${escapeHtml(data.content.x?.text || "")}</div>
      </div>

      <div class="platform">
        <h4>Facebook</h4>
        <div>${escapeHtml(data.content.facebook?.text || "")}</div>
      </div>
    `;
  } catch (e) {
    div.innerHTML = "Error generating posts.";
  }
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

</script>

</body>
</html>
